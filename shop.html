<!DOCTYPE html>
<html>
<head>
    <title>Eshop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="shop.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="shop.html">My Eshop</a>

        <div>
            <a href="cart.html" class="btn btn-warning">
                Cart 🛒
            </a>

            <a href="loginPage.html" id="loginBtn" class="btn btn-primary">
                Login
            </a>

            <button id="logoutBtn" class="btn btn-danger">
                Logout
            </button>
        </div>
    </div>
</nav>




<div class="container mt-5">

    <h1 class="text-center mb-4">
        Products
    </h1>


    <div id="products" class="row g-4">

    </div>


</div>


<div class="toast-container position-fixed top-0 end-0 p-3">

    <div id="welcomeToast"
         class="toast text-bg-success border-0"
         role="alert">

        <div class="d-flex">

            <div class="toast-body fs-5">
                👋 Welcome, <strong id="welcomeUser"></strong>!
            </div>

            <button
                type="button"
                class="btn-close btn-close-white me-2 m-auto"
                data-bs-dismiss="toast">
            </button>

        </div>

    </div>

    

</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">

    <div id="logoutToast" class="toast border-0">

        <div class="toast-body logout-toast">

            <span class="logout-icon">👋</span>

            <span>
                You have been logged out successfully.
            </span>

        </div>

    </div>


    <div id="loginToast" class="toast border-0">

        <div class="toast-body login-toast">

            <span class="login-icon">🔒</span>

            <span>
                Please log in first to add items to your cart.
            </span>

        </div>

    </div>

    <div id="cartToast"
         class="toast border-0">

        <div class="toast-body cart-toast">

            <span class="cart-icon">🛒</span>

            <span id="cartMessage">
                Product added to cart!
            </span>

        </div>

    </div>

</div>






<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="shop.js"></script>



</body>
</html>
